name: 'Starcast Resolve Playbook'
description: 'Determines playbook and role for a card based on its position in the project board'

inputs:
  issue_node_id:
    description: 'Issue node ID (github.event.issue.node_id)'
    required: true
  github_token:
    description: 'GitHub token with project read access'
    required: true
  playbooks_path:
    description: 'Path to playbooks directory in the production repo'
    required: false
    default: 'playbooks'
  error_label:
    description: 'Label to add when no playbook found (e.g. error)'
    required: false
    default: 'error'
  processing_label:
    description: 'Label indicating the card is being processed (e.g. processing)'
    required: false
    default: 'processing'

outputs:
  playbook:
    description: 'Playbook name to execute (empty if no handler found)'
    value: ${{ steps.resolve.outputs.playbook }}
  role:
    description: 'Role to run (empty if no handler found)'
    value: ${{ steps.resolve.outputs.role }}
  status:
    description: 'Current card status'
    value: ${{ steps.resolve.outputs.status }}
  smithery_servers:
    description: 'Newline-separated Smithery server names from playbook frontmatter'
    value: ${{ steps.resolve.outputs.smithery_servers }}

runs:
  using: composite
  steps:
    - name: Resolve
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        ISSUE_ID="${{ inputs.issue_node_id }}"
        PLAYBOOKS_PATH="${{ inputs.playbooks_path }}"
        ORG="${{ github.repository_owner }}"
        REPO="${{ github.event.repository.name }}"

        # Find project by name matching the repository name
        PROJECT_ID=$(gh api graphql -f query='
          query($org: String!, $name: String!) {
            organization(login: $org) {
              projectsV2(query: $name, first: 5) {
                nodes { id title }
              }
            }
          }' -f org="$ORG" -f name="$REPO" \
          --jq '.data.organization.projectsV2.nodes[]' \
          | jq -r --arg repo "$REPO" 'select(.title == $repo) | .id')

        if [ -z "$PROJECT_ID" ]; then
          echo "No project found with name '$REPO' in org '$ORG'."
          exit 1
        fi

        echo "Project ID: $PROJECT_ID"

        # Get current card status
        STATUS=$(gh api graphql -f query='
          query($id: ID!) {
            node(id: $id) {
              ... on Issue {
                projectItems(first: 10) {
                  nodes {
                    fieldValueByName(name: "Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue { name }
                    }
                  }
                }
              }
            }
          }' -f id="$ISSUE_ID" --jq '.data.node.projectItems.nodes[0].fieldValueByName.name // ""')

        echo "Status: $STATUS"

        # Get ordered list of status options from the board
        STATUS_OPTIONS=$(gh api graphql -f query='
          query($pid: ID!) {
            node(id: $pid) {
              ... on ProjectV2 {
                field(name: "Status") {
                  ... on ProjectV2SingleSelectField {
                    options { name }
                  }
                }
              }
            }
          }' -f pid="$PROJECT_ID" --jq '[.data.node.field.options[].name]')

        echo "Status options: $STATUS_OPTIONS"

        # Next status = playbook name (lowercase)
        NEXT_STATUS=$(echo "$STATUS_OPTIONS" | jq -r --arg cur "$STATUS" \
          'indices($cur)[0] as $i | if $i != null then .[$i+1] // empty else empty end')

        ERROR_LABEL="${{ inputs.error_label }}"

        if [ -z "$NEXT_STATUS" ]; then
          echo "No next status after '$STATUS' — adding $ERROR_LABEL label."
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "$ERROR_LABEL"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          exit 0
        fi

        PLAYBOOK=$(echo "$NEXT_STATUS" | tr '[:upper:]' '[:lower:]')
        echo "Playbook: $PLAYBOOK"

        # Read role from playbook frontmatter
        PLAYBOOK_FILE="$PLAYBOOKS_PATH/$PLAYBOOK.md"
        if [ ! -f "$PLAYBOOK_FILE" ]; then
          echo "No playbook file for '$PLAYBOOK' — adding $ERROR_LABEL label."
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "$ERROR_LABEL"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          exit 0
        fi

        ROLE=$(grep -m1 '^role:' "$PLAYBOOK_FILE" | awk '{print $2}')
        echo "Role: $ROLE"

        # Extract smithery: list from frontmatter
        SMITHERY_SERVERS=$(python3 - "$PLAYBOOK_FILE" <<'PYEOF'
import sys
servers = []
in_frontmatter = False
in_smithery = False
with open(sys.argv[1]) as f:
    for i, line in enumerate(f):
        line = line.rstrip()
        if i == 0 and line == '---':
            in_frontmatter = True; continue
        if in_frontmatter and line == '---':
            break
        if in_frontmatter:
            if line.startswith('smithery:'):
                in_smithery = True; continue
            if in_smithery:
                if line.startswith('  - '):
                    servers.append(line.strip()[2:].strip())
                elif not line.startswith(' '):
                    in_smithery = False
print('\n'.join(servers))
PYEOF
)

        echo "status=$STATUS"         >> $GITHUB_OUTPUT
        echo "playbook=$PLAYBOOK"     >> $GITHUB_OUTPUT
        echo "role=$ROLE"             >> $GITHUB_OUTPUT
        if [ -n "$SMITHERY_SERVERS" ]; then
          echo "smithery_servers<<EOF" >> $GITHUB_OUTPUT
          echo "$SMITHERY_SERVERS"     >> $GITHUB_OUTPUT
          echo "EOF"                   >> $GITHUB_OUTPUT
        fi
