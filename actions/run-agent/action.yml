name: 'Starcast Run Agent'
description: 'Assembles system prompt from framework + production context and runs a cast role on a card'

inputs:
  role:
    description: 'Cast role to run (filename without .md, e.g. scout, translator)'
    required: true
  playbook:
    description: 'Playbook to execute (filename without .md, e.g. fullfielding, translating)'
    required: true
  issue_number:
    description: 'Card number (GitHub Issue) to work on'
    required: true
  production_repo:
    description: 'Production repo full name (e.g. dupmachine/starcast-xbox)'
    required: true
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  anthropic_base_url:
    description: 'Custom Anthropic API base URL (optional)'
    required: false
    default: ''
  model:
    description: 'Claude model to use (e.g. claude-sonnet-4-6)'
    required: false
    default: 'claude-sonnet-4-6'
  github_token:
    description: 'GitHub token with repo and project write access'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout framework
      uses: actions/checkout@v4
      with:
        repository: dupmachine/starcast
        path: _starcast

    - name: Checkout production
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.production_repo }}
        token: ${{ inputs.github_token }}
        path: _production

    - name: Assemble system prompt
      shell: bash
      run: |
        echo "Assembling system prompt for role=${{ inputs.role }} playbook=${{ inputs.playbook }}"

        FRAMEWORK_CLAUDE=_starcast/CLAUDE.md
        PRODUCTION_CLAUDE=_production/CLAUDE.md
        ROLE_FILE=_production/cast/${{ inputs.role }}.md
        PLAYBOOK_FILE=_production/playbooks/${{ inputs.playbook }}.md

        for f in "$FRAMEWORK_CLAUDE" "$PRODUCTION_CLAUDE" "$ROLE_FILE" "$PLAYBOOK_FILE"; do
          if [ ! -f "$f" ]; then
            echo "ERROR: required file not found: $f"
            exit 1
          fi
        done

        cat "$FRAMEWORK_CLAUDE" \
            "$PRODUCTION_CLAUDE" \
            "$ROLE_FILE" \
            "$PLAYBOOK_FILE" \
            > CLAUDE.md

        echo "System prompt assembled ($(wc -l < CLAUDE.md) lines)"

        echo "::group::System prompt (CLAUDE.md)"
        cat CLAUDE.md
        echo "::endgroup::"

        echo "::group::Direct prompt"
        echo 'You are running playbook "${{ inputs.playbook }}" as the "${{ inputs.role }}" role.'
        echo 'Work on card #${{ inputs.issue_number }} in repository ${{ inputs.production_repo }}.'
        echo 'Follow your system prompt exactly. Do not deviate from the playbook steps.'
        echo "::endgroup::"

    - name: Run agent
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        github_token: ${{ inputs.github_token }}
        claude_args: --model ${{ inputs.model }} --dangerously-skip-permissions
        show_full_output: 'true'
        prompt: |
          You are running playbook "${{ inputs.playbook }}" as the "${{ inputs.role }}" role.
          Work on card #${{ inputs.issue_number }} in repository ${{ inputs.production_repo }}.
          Follow your system prompt exactly. Do not deviate from the playbook steps.
