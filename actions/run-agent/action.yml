name: 'Starcast Run Agent'
description: 'Resolves playbook, assembles system prompt, and runs the agent on a card'

inputs:
  issue_number:
    description: 'Card number (GitHub Issue) to work on'
    required: true
  app_id:
    description: 'Starcast bot GitHub App ID'
    required: true
  private_key:
    description: 'Starcast bot GitHub App private key'
    required: true
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  anthropic_base_url:
    description: 'Custom Anthropic API base URL (optional)'
    required: false
    default: ''
  model:
    description: 'Claude model to use (e.g. claude-sonnet-4-6)'
    required: false
    default: 'claude-sonnet-4-6'

runs:
  using: composite
  steps:
    - name: Generate bot token
      id: bot-token
      uses: tibdex/github-app-token@v2
      with:
        app_id: ${{ inputs.app_id }}
        private_key: ${{ inputs.private_key }}
        installation_retrieval_mode: organization
        installation_retrieval_payload: ${{ github.repository_owner }}

    - name: Checkout project
      uses: actions/checkout@v4
      with:
        path: _production

    - name: Resolve playbook
      id: resolve
      uses: dupmachine/starcast/actions/resolve-playbook@main
      with:
        issue_node_id: ${{ github.event.issue.node_id }}
        github_token: ${{ steps.bot-token.outputs.token }}
        playbooks_path: _production/playbooks

    - name: Checkout framework
      if: steps.resolve.outputs.role != ''
      uses: actions/checkout@v4
      with:
        repository: dupmachine/starcast
        path: _starcast

    - name: Assemble system prompt
      if: steps.resolve.outputs.role != ''
      shell: bash
      run: |
        ROLE="${{ steps.resolve.outputs.role }}"
        PLAYBOOK="${{ steps.resolve.outputs.playbook }}"

        echo "Assembling system prompt for role=$ROLE playbook=$PLAYBOOK"

        FRAMEWORK_CLAUDE=_starcast/CLAUDE.md
        PROJECT_CLAUDE=_production/CLAUDE.md
        ROLE_FILE=_production/roles/$ROLE.md
        PLAYBOOK_FILE=_production/playbooks/$PLAYBOOK.md

        for f in "$FRAMEWORK_CLAUDE" "$PROJECT_CLAUDE" "$ROLE_FILE" "$PLAYBOOK_FILE"; do
          if [ ! -f "$f" ]; then
            echo "ERROR: required file not found: $f"
            exit 1
          fi
        done

        cat "$FRAMEWORK_CLAUDE" \
            "$PROJECT_CLAUDE" \
            "$ROLE_FILE" \
            "$PLAYBOOK_FILE" \
            > CLAUDE.md

        echo "System prompt assembled ($(wc -l < CLAUDE.md) lines)"

        echo "::group::System prompt (CLAUDE.md)"
        cat CLAUDE.md
        echo "::endgroup::"

    - name: Run agent
      if: steps.resolve.outputs.role != ''
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
        ANTHROPIC_SMALL_FAST_MODEL: ${{ inputs.model }}
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        github_token: ${{ steps.bot-token.outputs.token }}
        allowed_bots: '*'
        claude_args: --model ${{ inputs.model }} --dangerously-skip-permissions
        show_full_output: 'true'
        prompt: |
          You are running playbook "${{ steps.resolve.outputs.playbook }}" as the "${{ steps.resolve.outputs.role }}" role.
          Work on card #${{ inputs.issue_number }} in repository ${{ github.repository }}.
          Follow your system prompt exactly. Do not deviate from the playbook steps.
