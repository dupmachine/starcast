name: 'Starcast Parse Project Event'
description: 'Extracts issue number and current Status from a projects_v2_item event'

outputs:
  issue_number:
    description: 'GitHub Issue number linked to the project card'
    value: ${{ steps.parse.outputs.issue_number }}
  status:
    description: 'Current Status field value of the project card'
    value: ${{ steps.parse.outputs.status }}

runs:
  using: composite
  steps:
    - name: Parse event
      id: parse
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ITEM_ID="${{ github.event.projects_v2_item.node_id }}"
        CONTENT_ID="${{ github.event.projects_v2_item.content_node_id }}"

        ISSUE_NUMBER=$(gh api graphql -f query='
          query($id: ID!) {
            node(id: $id) { ... on Issue { number } }
          }' -f id="$CONTENT_ID" --jq '.data.node.number')

        STATUS=$(gh api graphql -f query='
          query($id: ID!) {
            node(id: $id) {
              ... on ProjectV2Item {
                fieldValueByName(name: "Status") {
                  ... on ProjectV2ItemFieldSingleSelectValue { name }
                }
              }
            }
          }' -f id="$ITEM_ID" --jq '.data.node.fieldValueByName.name // ""')

        echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
        echo "status=$STATUS"             >> $GITHUB_OUTPUT
        echo "Card #$ISSUE_NUMBER → Status: $STATUS"
