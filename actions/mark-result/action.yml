name: 'Starcast Mark Result'
description: 'Marks a card as done (re-enqueues) or error based on job outcome'

inputs:
  status:
    description: 'Job status: success or failure (pass job.status)'
    required: true
  issue_number:
    description: 'GitHub Issue number'
    required: true
  trigger_label:
    description: 'Label that triggers the next pipeline run (e.g. waiting)'
    required: true
  error_label:
    description: 'Label that marks a failed card (e.g. error)'
    required: true
  bot_token:
    description: 'GitHub App token (used to add trigger_label so it fires workflows)'
    required: true

runs:
  using: composite
  steps:
    - name: Mark result
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
      run: |
        ISSUE="${{ inputs.issue_number }}"
        REPO="${{ github.repository }}"
        TRIGGER="${{ inputs.trigger_label }}"
        ERROR="${{ inputs.error_label }}"
        STATUS="${{ inputs.status }}"

        if [ "$STATUS" = "success" ]; then
          gh issue edit "$ISSUE" --repo "$REPO" --remove-label processing

          LABELS=$(gh issue view "$ISSUE" --repo "$REPO" \
            --json labels --jq '[.labels[].name]')
          if ! echo "$LABELS" | jq -e --arg e "$ERROR" 'contains([$e])' > /dev/null; then
            gh issue edit "$ISSUE" --repo "$REPO" --add-label "$TRIGGER"
          fi
        else
          gh issue edit "$ISSUE" --repo "$REPO" \
            --add-label "$ERROR" \
            --remove-label processing
        fi
